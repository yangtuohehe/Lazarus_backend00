# Project name
spring.application.name=Lazarus_backend00

# PostgreSQL database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/lazarus_modelbaseres
spring.datasource.username=postgres
spring.datasource.password=010318
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis configuration
# Location of XML mapper files
mybatis.mapper-locations=classpath:mapper/*.xml
# Enable auto-mapping from database snake_case to Java camelCase
mybatis.configuration.map-underscore-to-camel-case=true
# Package to scan for custom TypeHandlers (e.g., JtsGeometryTypeHandler)
mybatis.type-handlers-package=com.example.lazarus_backend00.infrastructure.config

# File upload constraints
# Maximum size allowed for a single file
spring.servlet.multipart.max-file-size=500MB
# Maximum size allowed for a total request (files + form data)
spring.servlet.multipart.max-request-size=500MB

# Virtual simulation settings
# Initial virtual start time (ISO-8601 format)
simulation.start-time=2022-01-03T00:00:00Z

# ===================================================================
# Lazarus Model Container Pool Resource Limits (Maps to ModelPoolConfig.java)
# ===================================================================

# [CPU Limit] Maximum number of models allowed to run concurrently.
# Recommendation: Logical CPU cores - 1 (e.g., set to 7 for an 8-core machine to reserve one for the OS).
lazarus.model-pool.max-concurrent-runs=4

# [Memory Limit] Maximum allowed off-heap/VRAM usage (Unit: MB).
# Purpose: To prevent Out-Of-Memory (OOM) crashes.
# Recommendation: 70% - 80% of physical RAM (e.g., set to 12288 for 16GB RAM).
# Example setting: 8192 (8GB).
lazarus.model-pool.max-memory-mb=8192

# [Queue Limit] Maximum wait time in the queue when resources are exhausted (Unit: Seconds).
# If resources are not acquired within this time, the task fails to prevent infinite loading on the frontend.
lazarus.model-pool.wait-timeout-seconds=300